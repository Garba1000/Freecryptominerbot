<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiocash FM</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#0f172a,#020617);
  color:#fff;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.card{
  width:100%;
  max-width:520px;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  padding:15px;
  margin-bottom:12px;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#38bdf8);
  color:#fff;
  cursor:pointer;
  margin-top:8px;
}

.play{
  width:70px;height:70px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,#38bdf8,#6366f1);
  font-size:24px;
}

.center{text-align:center}
.small{font-size:13px;color:#94a3b8}
.big{font-size:22px;font-weight:600}

.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  display:none;
  padding:20px;
  overflow:auto;
}
</style>
</head>

<body>

<!-- BALANCE -->
<div class="card center">
  <div class="big" id="points">0</div>
  <div class="small">Points</div>
  <div class="small" id="earned">$0.000</div>
</div>

<!-- PLAYER -->
<div class="card center">
  <select id="station" class="btn">
    <option value="https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one">BBC Radio 1</option>
    <option value="https://stream-uk1.radioparadise.com/mp3-192">Radio Paradise</option>
    <option value="https://icecast.omroep.nl/radio2-bb-mp3">NL Radio 2</option>
  </select>

  <button id="playBtn" class="play">
    <i class="fa fa-play"></i>
  </button>

  <div id="status" class="small">Idle</div>
</div>

<!-- ADS -->
<div class="card">
  <button id="watchAd" class="btn">Watch Ad (Bonus)</button>
  <div id="adsArea"></div>
</div>

<!-- ACTIONS -->
<div class="card">
  <button id="withdrawBtn" class="btn">Withdraw</button>
  <button id="refBtn" class="btn">Copy Referral Link</button>
  <button id="termsBtn" class="btn">Terms</button>
  <button id="infoBtn" class="btn">Info</button>
</div>

<!-- REF BONUS -->
<div class="card center">
  <div class="small">Referral Bonus</div>
  <div class="big" id="refBonus">0</div>
</div>

<!-- MODALS -->
<div id="termsModal" class="modal">
  <h3>Terms</h3>
  <p>
    This app provides online radio streaming. Rewards are optional and based on activity.
    No guaranteed income.
  </p>
  <button onclick="closeModal()">Close</button>
</div>

<div id="infoModal" class="modal">
  <h3>Info</h3>
  <p>
    Radiocash FM lets users listen to live radio and earn optional bonus points via ads.
  </p>
  <button onclick="closeModal()">Close</button>
</div>

<audio id="radio"></audio>

<script>
const STREAMS = [
  "https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one",
  "https://stream-uk1.radioparadise.com/mp3-192",
  "https://icecast.omroep.nl/radio2-bb-mp3"
];

const ADSGRAM_BLOCKS = ["task-26908","task-26909","task-26910","task-26911"];

const tg = window.Telegram.WebApp;

let points = Number(localStorage.getItem("p")||0);
let earned = Number(localStorage.getItem("e")||0);

const radio = document.getElementById("radio");
const station = document.getElementById("station");
const playBtn = document.getElementById("playBtn");
const status = document.getElementById("status");
const pointsEl = document.getElementById("points");
const earnedEl = document.getElementById("earned");
const adsArea = document.getElementById("adsArea");

let timer;

// ---------------- REF SYSTEM ----------------
const userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random()*999999);

const urlParams = new URLSearchParams(window.location.search);
let referrer = localStorage.getItem("referrer");

if(urlParams.get("start") && !referrer){
  referrer = urlParams.get("start");
  localStorage.setItem("referrer", referrer);
}

document.getElementById("refBtn").onclick = ()=>{
  const link = `https://t.me/YourBot?start=${userId}`;
  navigator.clipboard.writeText(link);
  tg.showAlert("Referral link copied");
};

// ---------------- UPDATE ----------------
function update(){
  pointsEl.textContent = points;
  earnedEl.textContent = "$"+earned.toFixed(3);
  document.getElementById("refBonus").textContent =
    localStorage.getItem("refBonus") || 0;

  localStorage.setItem("p",points);
  localStorage.setItem("e",earned);
}

// ---------------- PLAY ----------------
function playStream(){
  radio.src = station.value;
  radio.play();
  status.textContent = "Playing";

  timer = setInterval(()=>{
    if(points >= 100){
      points -= 100;
      addPoints(0.0002);
    }
    update();
  },20000);
}

// ---------------- ADD POINTS + REF ----------------
function addPoints(amount){
  earned += amount;

  if(referrer){
    let bonus = amount * 0.2;
    let refBonus = Number(localStorage.getItem("refBonus")||0);
    refBonus += bonus;
    localStorage.setItem("refBonus", refBonus);
  }
}

// ---------------- PLAYER ----------------
playBtn.onclick = ()=>{
  if(radio.paused){
    playStream();
  } else {
    radio.pause();
    clearInterval(timer);
    status.textContent = "Paused";
  }
};

// ---------------- ADS ----------------
document.getElementById("watchAd").onclick = ()=>{
  adsArea.innerHTML="";

  const ad = document.createElement("adsgram-task");
  ad.setAttribute("data-block-id",
    ADSGRAM_BLOCKS[Math.floor(Math.random()*ADSGRAM_BLOCKS.length)]
  );

  ad.addEventListener("reward", ()=>{
    setTimeout(()=>{
      points += 100;
      update();
      adsArea.innerHTML="";
      status.textContent = "Bonus added";
    },30000);
  });

  adsArea.appendChild(ad);
  if(ad.load) ad.load();
};

// ---------------- WITHDRAW FIX ----------------
document.getElementById("withdrawBtn").onclick = ()=>{

  if(earned < 5){
    tg.showAlert("❌ Insufficient funds. Minimum withdrawal is $5");
    return;
  }

  const wallet = prompt("Enter USDT (BEP20) or Binance ID:");

  if(!wallet || wallet.length < 5){
    tg.showAlert("❌ Invalid wallet");
    return;
  }

  Api.sendMessage({
    chat_id: 6136849497,
    text: `
📤 Withdraw Request - Radiocash FM
👤 User: ${tg.initDataUnsafe?.user?.id}
💵 Amount: $${earned.toFixed(3)}
💳 Wallet: ${wallet}
`
  });

  tg.showAlert("✅ Request sent");

  earned = 0;
  update();
};

// ---------------- MODALS ----------------
document.getElementById("termsBtn").onclick =
  ()=>document.getElementById("termsModal").style.display="block";

document.getElementById("infoBtn").onclick =
  ()=>document.getElementById("infoModal").style.display="block";

function closeModal(){
  document.getElementById("termsModal").style.display="none";
  document.getElementById("infoModal").style.display="none";
}

update();
</script>

</body>
</html>
