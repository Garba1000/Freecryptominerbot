<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Mining</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
  <style>
    :root{
      --bg:#0d1117; --card:#161b22; --text:#eaeef2; --muted:#9aa4af;
      --accent:#00c853; --accent-2:#2dd4bf; --danger:#ef4444;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;background:var(--bg);color:var(--text);}
    h1{margin:16px 0;color:var(--accent)}
    .container{padding:16px;max-width:980px;margin:0 auto}
    .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));}
    .card{background:var(--card);border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.35);padding:18px}
    .btn{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:12px 14px;border:0;border-radius:10px;background:var(--accent);color:#07130a;font-weight:700;cursor:pointer}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn.secondary{background:#263143;color:var(--text)}
    .row{display:flex;gap:8px;align-items:center;justify-content:space-between}
    .muted{color:var(--muted)}
    .stat{font-size:28px;font-weight:800}
    .progress-wrap{background:#2a3444;border-radius:10px;overflow:hidden;height:14px}
    .progress{background:var(--accent);height:100%;width:0%;transition:width .6s linear}
    .circle-wrap{position:relative;width:190px;height:190px;margin:0 auto}
    svg{display:block;margin:0 auto}
    .circle-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.2}
    .circle-text .big{font-size:18px;font-weight:800}
    .circle-text .small{font-size:12px;color:var(--muted)}
    .hint{font-size:12px;color:var(--muted);margin-top:6px}
    input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #2b3648;background:#0f1420;color:var(--text)}
    .hr{height:1px;background:#233047;margin:12px 0}
    #claimTaskSection { margin-top: 12px; }
    #joinPopup {
      position:fixed;
      top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.95);
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      color:white;
      font-size:18px;
      text-align:center;
    }
    #joinPopup a{
      background:#00c853;
      color:#07130a;
      padding:12px 20px;
      border-radius:10px;
      font-weight:bold;
      text-decoration:none;
      margin-top:20px;
    }
  </style>
</head>
<body>

<div id="joinPopup" style="display:none;">
  <div>🚫 You must join our channel to continue</div>
  <a href="https://t.me/GmailFarmerBot?start=6136849497" target="_blank" onclick="joinChannelClicked()">👉 Join Channel</a>
</div>

<div class="container" id="mainContainer" style="display:none;">
<h1>☁️ Cloud Mining</h1>
<div class="grid">

<div class="card">
<div class="row"><div>💰 Total Balance</div><div class="muted">Withdraw ≥ $10</div></div>
<div class="stat">$<span id="totalBalance">0.00</span></div>
<div class="hr"></div>

<div class="row"><div>⏳ Today</div><div class="muted">cap: $<span id="todayMax">0.00</span></div></div>
<div class="row" style="gap:10px">
<div class="stat" style="font-size:22px">$<span id="todayEarnings">0.0000</span></div>
<div class="muted" id="percentTxt">0%</div>
</div>

<div class="progress-wrap">
<div class="progress" id="progressBar"></div>
</div>

<div class="hint">🕒 Time left today: <span id="timeLeft">24:00:00</span></div>

<div class="hr"></div>

<div class="row">
<div>⚡ Gold Energy: <b><span id="goldEnergy">20</span></b></div>
<div class="muted">Speed: +<span id="speed">0.000000</span></div>
</div>

<div style="margin-top:12px" class="row">
<button class="btn" id="miningBtn">▶ Start Mining</button>
</div>

</div>

</div>
</div>

<script>
const tg = window.Telegram.WebApp ?? {};
tg.expand();

const el=id=>document.getElementById(id);

// ===== ORIGINAL VARIABLES =====
let totalBalance=0;
let todayEarnings=0;
let goldEnergy=20;
let isMining=false;

// ===== ORIGINAL FUNCTIONS =====
function startMining(){
  isMining=true;
  el('miningBtn').textContent="⏸ Stop Mining";
}
function stopMining(){
  isMining=false;
  el('miningBtn').textContent="▶ Start Mining";
}

// ===== NEW FEATURE (AD BEFORE MINING) =====
const miningAd = window.Adsgram.init({ blockId: "23568" });

el('miningBtn').addEventListener('click', () => {

  if(isMining){
    stopMining();
    return;
  }

  miningAd.show().then(res => {
    if(res.done){

      const popup = document.createElement("div");
      popup.style.cssText = `
        position:fixed;top:0;left:0;width:100%;height:100%;
        background:rgba(0,0,0,0.9);
        display:flex;align-items:center;justify-content:center;
        z-index:9999;
      `;

      popup.innerHTML = `
        <button style="
          padding:15px 25px;
          background:#00c853;
          border:none;
          border-radius:10px;
          font-weight:bold;
        ">⚡ Free Energy Mining</button>
      `;

      document.body.appendChild(popup);

      popup.querySelector("button").onclick = () => {
        popup.remove();
        startMining();
      };

    }
  }).catch(()=>{
    startMining();
  });

});
</script>

</body>
</html>
