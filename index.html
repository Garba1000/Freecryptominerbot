<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse FM</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#0f172a,#020617);
  color:#fff;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.card{
  width:100%;
  max-width:520px;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  padding:15px;
  margin-bottom:12px;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#38bdf8);
  color:#fff;
  cursor:pointer;
  margin-top:8px;
}

.play{
  width:70px;
  height:70px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,#38bdf8,#6366f1);
  font-size:24px;
}

.center{text-align:center}
.small{font-size:13px;color:#94a3b8}
.big{font-size:22px;font-weight:600}
</style>
</head>

<body>

<!-- BALANCE -->
<div class="card center">
  <div class="big" id="points">0</div>
  <div class="small">Points</div>
  <div class="small" id="earned">$0.000</div>
</div>

<!-- PLAYER -->
<div class="card center">
  <select id="station" class="btn">
    <option value="https://stream-uk1.radioparadise.com/mp3-192">Radio Paradise</option>
    <option value="https://icecast.omroep.nl/radio2-bb-mp3">NL Radio 2</option>
    <option value="https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one">Radio One (backup)</option>
  </select>

  <button id="playBtn" class="play">
    <i class="fa fa-play"></i>
  </button>

  <div id="status" class="small">Idle</div>
</div>

<!-- ADS -->
<div class="card">
  <button id="watchAd" class="btn">Watch Ad (Bonus)</button>
  <div id="adsArea"></div>
</div>

<!-- WITHDRAW -->
<div class="card">
  <button id="withdrawBtn" class="btn">Withdraw</button>
</div>

<audio id="radio"></audio>

<script>
const tg = window.Telegram.WebApp;

let points = Number(localStorage.getItem("p")||0);
let earned = Number(localStorage.getItem("e")||0);

const radio = document.getElementById("radio");
const station = document.getElementById("station");
const status = document.getElementById("status");

const pointsEl = document.getElementById("points");
const earnedEl = document.getElementById("earned");

let timer;

// ---------------- UPDATE ----------------
function update(){
  pointsEl.textContent = points;
  earnedEl.textContent = "$"+earned.toFixed(3);

  localStorage.setItem("p",points);
  localStorage.setItem("e",earned);
}

// ---------------- RADIO ----------------
document.getElementById("playBtn").onclick = ()=>{
  if(radio.paused){
    radio.src = station.value;

    radio.play().then(()=>{
      status.textContent = "🎧 Playing";
    }).catch(()=>{
      status.textContent = "❌ Stream error";
    });

    timer = setInterval(()=>{
      if(points >= 100){
        points -= 100;
        earned += 0.0002;
        update();
      }
    },20000);

  } else {
    radio.pause();
    clearInterval(timer);
    status.textContent = "⏸️ Paused";
  }
};

// ---------------- ADSGRAM ----------------
document.getElementById("watchAd").onclick = ()=>{
  const adsArea = document.getElementById("adsArea");
  adsArea.innerHTML = "";

  const ad = document.createElement("adsgram-task");
  ad.setAttribute("data-block-id","task-26908");

  ad.addEventListener("reward", ()=>{
    setTimeout(()=>{
      points += 100;
      update();
      adsArea.innerHTML="";
      status.textContent = "✅ Bonus added";
    },30000);
  });

  adsArea.appendChild(ad);
  if(ad.load) ad.load();
};

// ---------------- WITHDRAW FIX ----------------
document.getElementById("withdrawBtn").onclick = ()=>{

  earned = Number(earned || 0);

  if(earned < 5){
    tg.showAlert("❌ Insufficient funds. Minimum withdrawal is $5");
    return;
  }

  const wallet = prompt("Enter USDT (BEP20) or Binance ID:");

  if(!wallet){
    tg.showAlert("❌ Withdrawal cancelled");
    return;
  }

  if(wallet.length < 5){
    tg.showAlert("❌ Invalid wallet address");
    return;
  }

  // SAFE TELEGRAM SEND
  try{
    window.Telegram.WebApp.sendData(JSON.stringify({
      type:"withdraw",
      user: tg.initDataUnsafe?.user?.id,
      amount: earned,
      wallet: wallet
    }));
  }catch(e){
    console.log("sendData failed",e);
  }

  tg.showAlert("✅ Withdraw request sent");

  earned = 0;
  update();
};

update();
</script>

</body>
</html>
