<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Watch & Earn</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  margin: 0;
  padding: 0;
  text-align: center;
  color:#fff;
}

#mainContainer {
  display: none;
  padding: 20px;
  margin: 30px auto;
  width: 90%;
  max-width: 400px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
}

.button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 14px;
  background: linear-gradient(45deg,#007bff,#00c6ff);
  color: white;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.stats{
  background: rgba(255,255,255,0.08);
  padding:12px;
  border-radius:10px;
  margin-bottom:15px;
}

#joinPopup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 999999999;
  display: none;
  justify-content: center;
  align-items: center;
}

#taskMessage {
  display:none;
  color:#00ff00;
  font-weight:bold;
}

#miningPopup {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99999;
}
</style>
</head>

<body>

<div id="joinPopup">
  <div>
    <h2>🚫 Join channel first</h2>
    <a href="https://t.me/FoxiGrowbot?start=ref_6910486529" target="_blank" onclick="joinChannelClicked()" class="button">
       👉 Join Channel
    </a>
  </div>
</div>

<div id="mainContainer">
  <h1>⛏️ Free Mining</h1>

  <div class="stats">
    <p>💰 Balance: $<span id="balance">0.00</span></p>
  </div>

  <div class="stats">
    <p>⚡ Status: <span id="miningStatus">Idle</span></p>
    <p>⛏️ Speed: <span id="miningSpeed">0.00</span> GH/s</p>
    <p>💎 Mined: $<span id="minedAmount">0.0000</span></p>
  </div>

  <button class="button" id="startMiningBtn" style="display:none;">🚀 Start Mining</button>
  <button class="button" id="stopMiningBtn" style="display:none;">⛔ Stop Mining</button>

  <button class="button" id="miningNowBtn">⛏️ Mining Now</button>

  <button class="button" id="taskBtn">✅ Task</button>
  <button class="button" id="withdrawBtn">💵 Withdraw</button>
  <button class="button" id="referralBtn">🔗 Copy Referral Link</button>

  <div id="taskSection" style="display:none;">
    <adsgram-task id="currentTask" data-block-id="task-25604"></adsgram-task>
    <div id="taskMessage">🎉 Task completed!</div>
  </div>
</div>

<div id="miningPopup">
  <button class="button" id="popupStartMining">🚀 Start Mining</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const balanceKey='user_balance';
const tasksKey='tasks_completed';
const miningKey='mining_data';
const ADMIN_ID=6910486529;

/* SAFE BALANCE */
let balance = parseFloat(localStorage.getItem(balanceKey));
if(isNaN(balance)) balance = 0;

let tasksCompleted=JSON.parse(localStorage.getItem(tasksKey))||{};

const taskQueue=["task-26154","task-26155","task-26157","task-26159"];
const rewardBlocks = ["26146","26147","26148"];

function getRandomBlock(){
  return rewardBlocks[Math.floor(Math.random()*rewardBlocks.length)];
}

function updateUI(){
  document.getElementById("balance").textContent=balance.toFixed(2);
}
updateUI();

function addReward(amount){
  balance += amount;
  localStorage.setItem(balanceKey, balance);
  updateUI();
}

/* LOAD MINING DATA */
let miningActive = false;
let miningSpeed = 0;
let minedAmount = 0;

const savedMining = JSON.parse(localStorage.getItem(miningKey));
if(savedMining){
  miningActive = savedMining.active || false;
  miningSpeed = savedMining.speed || 0;
  minedAmount = savedMining.mined || 0;
}

/* RANDOM PRELOAD AD */
window.Adsgram.init({blockId:getRandomBlock()}).show().finally(()=>{
  document.getElementById("joinPopup").style.display="flex";
});

function joinChannelClicked(){
  if(!localStorage.getItem('joined_channel')){
    addReward(0.001);
    localStorage.setItem('joined_channel',"yes");
  }
  document.getElementById("joinPopup").style.display="none";
  document.getElementById("mainContainer").style.display="block";
}

/* MINING NOW */
let firstMiningAdShown = false;

document.getElementById("miningNowBtn").addEventListener("click", async () => {
  try {
    const ad = window.Adsgram.init({blockId: getRandomBlock()});
    await ad.show();
  } catch(e){}
  document.getElementById("miningPopup").style.display = "flex";
});

/* POPUP */
document.getElementById("popupStartMining").addEventListener("click", () => {
  document.getElementById("miningPopup").style.display = "none";
  document.getElementById("taskSection").style.display = "block";

  const randomTask = taskQueue[Math.floor(Math.random() * taskQueue.length)];
  loadMiningTask(randomTask);
});

/* TASK */
function loadMiningTask(id){
  const newTask = document.createElement("adsgram-task");
  newTask.setAttribute("data-block-id", id);
  newTask.id = "currentTask";

  document.getElementById("currentTask").replaceWith(newTask);

  newTask.addEventListener("reward", () => {
    miningActive = true;
    miningSpeed += 1;

    startMining();
    startSpeedDrain();
    updateMiningUI();
    saveMining();

    document.getElementById("taskSection").style.display = "none";
  });
}

document.getElementById("taskBtn").addEventListener("click",()=>{
  document.getElementById("taskSection").style.display="block";
});

/* WITHDRAW */
document.getElementById("withdrawBtn").addEventListener("click",()=>{
  if(balance < 6) return alert("❌ Minimum withdraw is $6");

  tg.sendData(JSON.stringify({
    action:"forward_to_admin",
    admin_id:ADMIN_ID,
    user_id:tg.initDataUnsafe.user.id,
    amount:balance
  }));

  alert("✅ Withdrawal sent");
  balance=0;
  localStorage.setItem(balanceKey, balance);
  updateUI();
});

/* REFERRAL */
document.getElementById("referralBtn").addEventListener("click",()=>{
  const link=`https://t.me/Earnbutbot?start=${tg.initDataUnsafe.user.id}`;
  navigator.clipboard.writeText(link);
  alert("Copied!");
});

/* MINING SYSTEM */
let miningInterval = null;
let speedInterval = null;

function updateMiningUI(){
  document.getElementById("miningStatus").textContent = miningActive ? "Active" : "Idle";
  document.getElementById("miningSpeed").textContent = miningSpeed.toFixed(2);
  document.getElementById("minedAmount").textContent = minedAmount.toFixed(4);

  document.getElementById("stopMiningBtn").style.display = miningActive ? "block" : "none";
}

function saveMining(){
  localStorage.setItem(miningKey, JSON.stringify({
    active: miningActive,
    speed: miningSpeed,
    mined: minedAmount
  }));
}

document.getElementById("stopMiningBtn").addEventListener("click", () => {
  miningActive = false;
  clearInterval(miningInterval);
  clearInterval(speedInterval);
  updateMiningUI();
  saveMining();
});

/* AUTO RESUME */
if(miningActive && miningSpeed > 0){
  startMining();
  startSpeedDrain();
}

function startMining(){
  clearInterval(miningInterval);

  miningInterval = setInterval(() => {
    if(!miningActive || miningSpeed <= 0) return;

    minedAmount += 0.001;
    updateMiningUI();
    saveMining();
  }, 1000);
}

function startSpeedDrain(){
  clearInterval(speedInterval);

  speedInterval = setInterval(async () => {
    if(!miningActive) return;

    if(miningSpeed > 0){
      addReward(0.05);
      miningSpeed -= 1;
    }

    if(miningSpeed <= 0){
      miningSpeed = 0;
      miningActive = false;

      clearInterval(miningInterval);
      clearInterval(speedInterval);

      updateMiningUI();
      saveMining();

      try {
        const ad = window.Adsgram.init({blockId: getRandomBlock()});
        await ad.show();
      } catch(e){}

      document.getElementById("miningPopup").style.display = "flex";
    }

    updateMiningUI();
    saveMining();

  }, 30000);
}

updateMiningUI();
</script>

</body>
</html>
