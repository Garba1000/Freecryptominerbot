<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiocash FM</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#0f172a,#020617);
  color:#fff;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.card{
  width:100%;
  max-width:520px;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  padding:15px;
  margin-bottom:12px;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#38bdf8);
  color:#fff;
  cursor:pointer;
  margin-top:8px;
}

.play{
  width:70px;height:70px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,#38bdf8,#6366f1);
  font-size:24px;
}

.center{text-align:center}
.small{font-size:13px;color:#94a3b8}
.big{font-size:22px;font-weight:600}

.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  display:none;
  padding:20px;
  overflow:auto;
}

/* ✅ FIXED JOIN POPUP THEME */
#joinPopup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:linear-gradient(180deg,#0f172a,#020617);
  z-index:9999;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

#joinPopup a{
  background:linear-gradient(135deg,#6366f1,#38bdf8);
  color:#fff;
  padding:12px 20px;
  border-radius:10px;
  text-decoration:none;
  margin-top:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- JOIN POPUP -->
<div id="joinPopup">
  <div>🚫 You must join our channel to continue</div>
  <a href="https://t.me/Konnetearnchannel"
     target="_blank"
     onclick="joinChannelClicked(event)">
     👉 Join Channel
  </a>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none; width:100%; flex-direction:column; align-items:center;">

<div class="card center">
  <div class="big" id="points">0</div>
  <div class="small">Points</div>
  <div class="small" id="earned">$0.000</div>
</div>

<div class="card center">
  <select id="station" class="btn">
    <option value="https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one">BBC Radio 1</option>
    <option value="https://stream-uk1.radioparadise.com/mp3-192">Radio Paradise</option>
    <option value="https://icecast.omroep.nl/radio2-bb-mp3">NL Radio 2</option>
  </select>

  <button id="playBtn" class="play">
    <i class="fa fa-play"></i>
  </button>

  <div id="status" class="small">Idle</div>
</div>

<div class="card">
  <button id="watchAd" class="btn">Watch Ad (optional)</button>
  <button id="welcomeBonus" class="btn">Welcome Bonus (Optional)</button>

  <div id="adsArea"></div>
  <div id="welcomeArea"></div>
</div>

<div class="card">
  <button id="withdrawBtn" class="btn">Withdraw</button>
  <button id="refBtn" class="btn">Copy Referral Link</button>
  <button id="termsBtn" class="btn">Terms</button>
  <button id="infoBtn" class="btn">Info</button>
</div>

<div class="card center">
  <div class="small">Referral Bonus</div>
  <div class="big" id="refBonus">0</div>
</div>

</div>

<div id="termsModal" class="modal">
  <h3>Terms</h3>
  <p>This app provides online radio streaming. Rewards are optional and based on user activity.</p>
  <button onclick="closeModal()">Close</button>
</div>

<div id="infoModal" class="modal">
  <h3>Info</h3>
  <p>Radiocash FM lets users listen to live radio and earn optional bonus points via ads.</p>
  <button onclick="closeModal()">Close</button>
</div>

<audio id="radio"></audio>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// ---------------- POINTS ----------------
let points = Number(localStorage.getItem("p")||0);
let earned = Number(localStorage.getItem("e")||0);

// ---------------- TASK BLOCK IDS ----------------
const ADSGRAM_TASKS = [
  "task-27929",
  "task-28027",
  "task-27930",
  "task-27931"
];

const WELCOME_BLOCKS = ["27928","28010"];

// ---------------- UPDATE ----------------
function update(){
  document.getElementById("points").textContent = points;
  document.getElementById("earned").textContent = "$"+Number(earned).toFixed(3);
  localStorage.setItem("p",points);
  localStorage.setItem("e",earned);
}

// ---------------- JOIN CLICK ----------------
function joinChannelClicked(e){
  if(e) e.preventDefault();

  if(!localStorage.getItem("joined")){
    localStorage.setItem("joined","yes");
    points += 50;
    update();
  }

  window.open("https://t.me/Konnetearnchannel","_blank");

  document.getElementById("joinPopup").style.display = "none";
  document.getElementById("mainApp").style.display = "flex";
}

// ---------------- PRELOAD ADSGRAM (NEW FIX) ----------------
window.addEventListener("load", ()=>{

  const ad = window.Adsgram.init({ blockId: "27928" });

  ad.show().then(()=>{
    document.getElementById("joinPopup").style.display = "flex";
  }).catch(()=>{
    document.getElementById("joinPopup").style.display = "flex";
  });

});

// ---------------- WATCH AD ----------------
document.getElementById("watchAd").onclick = ()=>{
  const ad = document.createElement("adsgram-task");

  const randomTask = ADSGRAM_TASKS[Math.floor(Math.random()*ADSGRAM_TASKS.length)];
  ad.setAttribute("data-block-id", randomTask);

  ad.addEventListener("reward", ()=>{
    setTimeout(()=>{
      points += 100;
      update();
    },30000);
  });

  document.getElementById("adsArea").innerHTML = "";
  document.getElementById("adsArea").appendChild(ad);
};

// ---------------- WELCOME BONUS ----------------
document.getElementById("welcomeBonus").onclick = ()=>{
  const blockId = WELCOME_BLOCKS[Math.floor(Math.random()*WELCOME_BLOCKS.length)];
  const ad = window.Adsgram.init({ blockId });

  ad.show().then(()=>{
    const area = document.getElementById("welcomeArea");
    area.innerHTML = "";

    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = "Claim Welcome Bonus (1000 points)";

    btn.onclick = ()=>{
      points += 1000;
      update();
      tg.showAlert("🎉 Welcome bonus added!");
      btn.remove();
    };

    area.appendChild(btn);
  }).catch(()=>{
    const area = document.getElementById("welcomeArea");
    area.innerHTML = "";

    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = "Claim Welcome Bonus (1000 points)";

    btn.onclick = ()=>{
      points += 1000;
      update();
      tg.showAlert("🎉 Welcome bonus added!");
      btn.remove();
    };

    area.appendChild(btn);
  });
};

// ---------------- RADIO ----------------
let timer;
const radio = document.getElementById("radio");
const station = document.getElementById("station");
const playBtn = document.getElementById("playBtn");
const status = document.getElementById("status");

function playStream(){
  radio.src = station.value;
  radio.play();
  status.textContent = "Playing";

  timer = setInterval(()=>{
    if(points >= 100){
      points -= 100;
      earned += 0.0002;
    }
    update();
  },20000);
}

playBtn.onclick = ()=>{
  if(radio.paused){
    playStream();
  } else {
    radio.pause();
    clearInterval(timer);
    status.textContent = "Paused";
  }
};

update();
</script>

</body>
</html>
