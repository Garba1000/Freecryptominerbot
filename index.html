<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Watch & Earn</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  margin: 0;
  padding: 0;
  text-align: center;
  color:#fff;
}

#mainContainer {
  display: none;
  padding: 20px;
  margin: 30px auto;
  width: 90%;
  max-width: 400px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
}

.button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 14px;
  background: linear-gradient(45deg,#007bff,#00c6ff);
  color: white;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.button:hover{
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(0,198,255,0.7);
}

.stats{
  background: rgba(255,255,255,0.08);
  padding:12px;
  border-radius:10px;
  margin-bottom:15px;
}

#joinPopup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 999999999;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 25px;
}

#popupBox {
  background: #ffffff10;
  padding: 30px 20px;
  border-radius: 14px;
}

#taskMessage {
  display:none;
  color:#00ff00;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="joinPopup">
  <div id="popupBox">
    <h2>🚫 You must join our channel to continue</h2>
    <a href="https://t.me/earnzoners" target="_blank" onclick="joinChannelClicked()" class="button">
       👉 Join Telegram Channel
    </a>
  </div>
</div>

<div id="mainContainer">
  <h1>⛏️ Free Mining</h1>

  <div class="stats">
    <p>💰 Balance: $<span id="balance">0.00</span></p>
  </div>

  <button class="button" id="watchBtn">⛏️ Free Mining</button>
  <button class="button" id="taskBtn">✅ Task</button>
  <button class="button" id="withdrawBtn">💵 Withdraw</button>
  <button class="button" id="referralBtn">🔗 Copy Referral Link</button>

  <div id="taskSection" style="display:none;">
    <h3>Complete Task</h3>
    <adsgram-task id="currentTask" data-block-id="task-25604"></adsgram-task>
    <div id="taskMessage">🎉 Social task completed successfully!</div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const balanceKey='user_balance';
const tasksKey='tasks_completed';

const ADMIN_ID=6910486529;

let balance = localStorage.getItem(balanceKey) !== null 
  ? parseFloat(localStorage.getItem(balanceKey)) 
  : 0;

let tasksCompleted=JSON.parse(localStorage.getItem(tasksKey))||{};

const taskQueue=["task-25600","task-25601","task-25602","task-25603"];
let taskIndex=0;

/* RANDOM REWARD BLOCKS */
const rewardBlocks = ["25599","25596","25598"];

function getRandomBlock(){
  return rewardBlocks[Math.floor(Math.random()*rewardBlocks.length)];
}

function updateUI(){
  document.getElementById("balance").textContent=balance.toFixed(2);
}
updateUI();

function addReward(amount){
  balance += amount;
  localStorage.setItem(balanceKey, balance);
  updateUI();
}

/* INIT POPUP AD */
window.Adsgram.init({blockId:"25597"}).show().finally(()=>{
  document.getElementById("joinPopup").style.display="flex";
});

function joinChannelClicked(){
  if(!localStorage.getItem('joined_channel')){
    addReward(0.001);
    localStorage.setItem('joined_channel',"yes");
  }

  document.getElementById("joinPopup").style.display="none";
  document.getElementById("mainContainer").style.display="block";
}

/* ⚡ FREE MINING ENERGY BUTTON */
const commentBtn = document.createElement("button");
commentBtn.className = "button";
commentBtn.id = "commentMenuBtn";
commentBtn.textContent = "⚡ Free Mining Energy";
commentBtn.style.display = "none";
document.getElementById("mainContainer").appendChild(commentBtn);

/* ⛏️ FREE MINING CLICK */
document.getElementById("watchBtn").addEventListener("click", async () => {
  try {
    const ad = window.Adsgram.init({blockId: getRandomBlock()});
    let res = await ad.show();
    if (res.done) {
      commentBtn.style.display = "block";
    }
  } catch (e) {}
});

/* ENERGY TASK */
commentBtn.addEventListener("click", () => {
  commentBtn.style.display = "none";

  let availableTasks = taskQueue.filter(t => !tasksCompleted[t]);
  if (availableTasks.length === 0) {
    availableTasks = taskQueue.slice();
    tasksCompleted = {};
  }

  let randomTaskId = availableTasks[Math.floor(Math.random() * availableTasks.length)];

  const newTask = document.createElement("adsgram-task");
  newTask.setAttribute("data-block-id", randomTaskId);
  newTask.id = "commentTask";

  const taskSection = document.getElementById("taskSection");
  taskSection.style.display = "block";

  const oldTask = document.getElementById("currentTask");
  if (oldTask) oldTask.replaceWith(newTask);

  newTask.addEventListener("reward", () => {
    addReward(0.05);
    tasksCompleted[randomTaskId] = true;
    localStorage.setItem(tasksKey, JSON.stringify(tasksCompleted));
    alert("⚡ Energy claimed! +$0.05");
    taskSection.style.display = "none";
  });
});

/* TASK SYSTEM (UNCHANGED) */
document.getElementById("taskBtn").addEventListener("click",()=>{
  document.getElementById("taskSection").style.display="block";
  loadTask(taskQueue[taskIndex]);
});

function loadTask(id){
  const newTask=document.createElement("adsgram-task");
  newTask.setAttribute("data-block-id",id);
  newTask.id="currentTask";
  document.getElementById("currentTask").replaceWith(newTask);

  newTask.addEventListener("reward",()=>{
    addReward(0.02);
    tasksCompleted[id]=true;
    localStorage.setItem(tasksKey,JSON.stringify(tasksCompleted));

    if(taskIndex<taskQueue.length-1){
      taskIndex++;
    }else{
      taskIndex=0;
      const msg=document.getElementById("taskMessage");
      msg.style.display="block";
      setTimeout(()=>{msg.style.display="none";},30000);
    }

    loadTask(taskQueue[taskIndex]);
  });
}

/* WITHDRAW */
document.getElementById("withdrawBtn").addEventListener("click",()=>{
  if(balance < 6) return alert("❌ Minimum withdraw is $6");

  tg.sendData(JSON.stringify({
    action:"forward_to_admin",
    admin_id:ADMIN_ID,
    user_id:tg.initDataUnsafe.user.id,
    amount:balance
  }));

  alert("✅ Withdrawal sent");
  balance=0;
  localStorage.setItem(balanceKey, balance);
  updateUI();
});
</script>

</body>
</html>
