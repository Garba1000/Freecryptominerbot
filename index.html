<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiocash Player</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#0f172a,#020617);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:15px;
}

/* HEADER */
.header{
  width:100%;
  max-width:520px;
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}
.title{font-size:20px;font-weight:600;color:#38bdf8}

/* CARD */
.card{
  width:100%;
  max-width:520px;
  background:rgba(255,255,255,0.04);
  border-radius:14px;
  padding:15px;
  margin-bottom:12px;
  backdrop-filter:blur(10px);
}

/* PLAYER */
.play-btn{
  width:70px;height:70px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,#38bdf8,#6366f1);
  color:#fff;
  font-size:24px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#38bdf8);
  color:#fff;
  font-weight:500;
  cursor:pointer;
}

/* TEXT */
.center{text-align:center}
.small{font-size:13px;color:#94a3b8}
.big{font-size:22px;font-weight:600}

/* ADS AREA */
#adsArea{margin-top:10px}
</style>
</head>

<body>

<div class="header">
  <div class="title">Radiocash</div>
</div>

<div class="card center">
  <div class="big" id="points">0</div>
  <div class="small">Points</div>
  <div class="small" id="earned">$0.000</div>
</div>

<div class="card center">
  <button id="playBtn" class="play-btn">
    <i class="fa fa-play"></i>
  </button>
  <div id="status" class="small" style="margin-top:10px">
    Start listening
  </div>
</div>

<div class="card">
  <div class="small">Optional bonus</div>
  <button id="watchAd" class="btn">Watch Ad</button>
  <div id="adsArea"></div>
</div>

<div class="card">
  <button id="withdrawBtn" class="btn">Withdraw</button>
</div>

<audio id="radio"></audio>

<script>
const STREAM = "https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one";
const ADSGRAM_BLOCKS = ["task-26908","task-26909","task-26910","task-26911"];

const tg = window.Telegram.WebApp;

let points = Number(localStorage.getItem("p")||0);
let earned = Number(localStorage.getItem("e")||0);

const radio = document.getElementById("radio");
const playBtn = document.getElementById("playBtn");
const status = document.getElementById("status");
const pointsEl = document.getElementById("points");
const earnedEl = document.getElementById("earned");
const adsArea = document.getElementById("adsArea");

let timer = null;

// UI UPDATE
function update(){
  pointsEl.textContent = points;
  earnedEl.textContent = "$"+earned.toFixed(3);
  localStorage.setItem("p",points);
  localStorage.setItem("e",earned);
}

// RANDOM ADS BLOCK
function randomBlock(){
  return ADSGRAM_BLOCKS[Math.floor(Math.random()*ADSGRAM_BLOCKS.length)];
}

// PLAYER
playBtn.onclick = ()=>{
  if(radio.paused){
    radio.src = STREAM;
    radio.play();
    status.textContent = "Playing";

    timer = setInterval(()=>{
      if(points >= 100){
        points -= 100;
        earned += 0.0002;
        update();
      }
    },20000);

  } else {
    radio.pause();
    clearInterval(timer);
    status.textContent = "Paused";
  }
};

// ADS
document.getElementById("watchAd").onclick = ()=>{
  adsArea.innerHTML = "";

  const ad = document.createElement("adsgram-task");
  ad.setAttribute("data-block-id", randomBlock());

  ad.addEventListener("reward", ()=>{
    setTimeout(()=>{
      points += 100;
      update();
      adsArea.innerHTML="";
      status.textContent = "Bonus added";
    },30000);
  });

  adsArea.appendChild(ad);
  if(ad.load) ad.load();
};

// WITHDRAW
document.getElementById("withdrawBtn").onclick = ()=>{
  if(earned < 10){
    tg.showAlert("Minimum withdraw is $10");
    return;
  }

  Api.sendMessage({
    chat_id: 6136849497,
    text: `Withdraw\nUser: ${tg.initDataUnsafe?.user?.id}\n$${earned}`
  });

  tg.showAlert("Request sent");
};

update();
</script>

</body>
</html>
