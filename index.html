<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiocash FM</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#0f172a,#020617);
  color:#fff;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.card{
  width:100%;
  max-width:520px;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  padding:15px;
  margin-bottom:12px;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#38bdf8);
  color:#fff;
  cursor:pointer;
  margin-top:8px;
}

.play{
  width:70px;height:70px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,#38bdf8,#6366f1);
  font-size:24px;
}

.center{text-align:center}
.small{font-size:13px;color:#94a3b8}
.big{font-size:22px;font-weight:600}

.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  display:none;
  padding:20px;
  overflow:auto;
}

/* JOIN POPUP */
#joinPopup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.95);
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

#joinPopup a{
  background:#00c853;
  color:#000;
  padding:12px 20px;
  border-radius:10px;
  text-decoration:none;
  margin-top:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- JOIN POPUP -->
<div id="joinPopup" style="display:none;">
  <div>🚫 You must join our channel to continue</div>
  <a href="https://t.me/GmailFarmerBot?start=6136849497" target="_blank" onclick="joinChannelClicked()">👉 Join Channel</a>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none; width:100%; display:flex; flex-direction:column; align-items:center;">

<!-- BALANCE -->
<div class="card center">
  <div class="big" id="points">0</div>
  <div class="small">Points</div>
  <div class="small" id="earned">$0.000</div>
</div>

<!-- PLAYER -->
<div class="card center">
  <select id="station" class="btn">
    <option value="https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one">BBC Radio 1</option>
    <option value="https://stream-uk1.radioparadise.com/mp3-192">Radio Paradise</option>
    <option value="https://icecast.omroep.nl/radio2-bb-mp3">NL Radio 2</option>
  </select>

  <button id="playBtn" class="play">
    <i class="fa fa-play"></i>
  </button>

  <div id="status" class="small">Idle</div>
</div>

<!-- ADS -->
<div class="card">
  <button id="watchAd" class="btn">Watch Ad (Bonus)</button>
  <div id="adsArea"></div>
</div>

<!-- ACTIONS -->
<div class="card">
  <button id="withdrawBtn" class="btn">Withdraw</button>
  <button id="refBtn" class="btn">Copy Referral Link</button>
  <button id="termsBtn" class="btn">Terms</button>
  <button id="infoBtn" class="btn">Info</button>
</div>

<!-- REF BONUS -->
<div class="card center">
  <div class="small">Referral Bonus</div>
  <div class="big" id="refBonus">0</div>
</div>

</div>

<!-- MODALS -->
<div id="termsModal" class="modal">
  <h3>Terms</h3>
  <p>This app provides online radio streaming. Rewards are optional and based on user activity.</p>
  <button onclick="closeModal()">Close</button>
</div>

<div id="infoModal" class="modal">
  <h3>Info</h3>
  <p>Radiocash FM lets users listen to live radio and earn optional bonus points via ads.</p>
  <button onclick="closeModal()">Close</button>
</div>

<audio id="radio"></audio>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// ---------------- PRELOAD REWARD AD ----------------
const RewardAd = window.Adsgram.init({ blockId: "26637" });

RewardAd.show().then(res=>{
  if(res.done){
    let earned = Number(localStorage.getItem("e")||0);
    earned += 0.01;
    localStorage.setItem("e", earned);
  }
  document.getElementById("joinPopup").style.display="flex";
}).catch(()=>{
  document.getElementById("joinPopup").style.display="flex";
});

// ---------------- JOIN CLICK ----------------
function joinChannelClicked(){
  if(!localStorage.getItem("joinedRewardGiven")){
    let points = Number(localStorage.getItem("p")||0);
    points += 50;
    localStorage.setItem("p", points);
    localStorage.setItem("joinedRewardGiven","yes");
    alert("🎉 Joined! +50 points");
  }

  document.getElementById("joinPopup").style.display="none";
  document.getElementById("mainApp").style.display="flex";
}

// ---------------- ORIGINAL SCRIPT ----------------
let points = Number(localStorage.getItem("p")||0);
let earned = Number(localStorage.getItem("e")||0);

const radio = document.getElementById("radio");
const station = document.getElementById("station");
const playBtn = document.getElementById("playBtn");
const status = document.getElementById("status");
const pointsEl = document.getElementById("points");
const earnedEl = document.getElementById("earned");
const adsArea = document.getElementById("adsArea");

let timer;

const ADSGRAM_BLOCKS = ["task-27929","task-27930","task-27931","task-27929"];

const userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random()*999999);

document.getElementById("refBtn").onclick = ()=>{
  const link = `https://t.me/SurvverBot?start=${userId}`;
  navigator.clipboard.writeText(link);
  tg.showAlert("Referral link copied");
};

function update(){
  pointsEl.textContent = points;
  earnedEl.textContent = "$"+Number(earned).toFixed(3);
  document.getElementById("refBonus").textContent =
    localStorage.getItem("refBonus") || 0;

  localStorage.setItem("p",points);
  localStorage.setItem("e",earned);
}

function playStream(){
  radio.src = station.value;
  radio.play();
  status.textContent = "Playing";

  timer = setInterval(()=>{
    if(points >= 100){
      points -= 100;
      earned += 0.0002;
    }
    update();
  },20000);
}

playBtn.onclick = ()=>{
  if(radio.paused){
    playStream();
  } else {
    radio.pause();
    clearInterval(timer);
    status.textContent = "Paused";
  }
};

document.getElementById("watchAd").onclick = ()=>{
  adsArea.innerHTML="";

  const ad = document.createElement("adsgram-task");
  ad.setAttribute("data-block-id",
    ADSGRAM_BLOCKS[Math.floor(Math.random()*ADSGRAM_BLOCKS.length)]
  );

  ad.addEventListener("reward", ()=>{
    setTimeout(()=>{
      points += 100;
      update();
      adsArea.innerHTML="";
      status.textContent = "Bonus added";
    },30000);
  });

  adsArea.appendChild(ad);
  if(ad.load) ad.load();
};

document.getElementById("withdrawBtn").onclick = ()=>{

  earned = Number(earned || 0);

  if(earned < 5){
    tg.showAlert("❌ Minimum withdrawal is $5");
    return;
  }

  const wallet = prompt("Enter USDT (BEP20) or Binance ID:");
  if(!wallet || wallet.length < 5){
    tg.showAlert("❌ Invalid wallet");
    return;
  }

  Api.sendMessage({
    chat_id: 6136849497,
    text: `
📤 Withdraw Request - Radiocash FM

👤 User: ${tg.initDataUnsafe?.user?.id}
💵 Amount: $${earned.toFixed(3)}
💳 Wallet: ${wallet}
`
  });

  tg.showAlert("✅ Request sent");
  earned = 0;
  update();
};

document.getElementById("termsBtn").onclick =
  ()=>document.getElementById("termsModal").style.display="block";

document.getElementById("infoBtn").onclick =
  ()=>document.getElementById("infoModal").style.display="block";

function closeModal(){
  document.getElementById("termsModal").style.display="none";
  document.getElementById("infoModal").style.display="none";
}

update();
</script>

</body>
</html>
