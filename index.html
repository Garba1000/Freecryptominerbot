<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiocash FM</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#0f172a,#020617);
  color:#fff;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.card{
  width:100%;
  max-width:520px;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  padding:15px;
  margin-bottom:12px;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#38bdf8);
  color:#fff;
  cursor:pointer;
  margin-top:8px;
}

.play{
  width:70px;height:70px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,#38bdf8,#6366f1);
  font-size:24px;
}

.small{font-size:13px;color:#94a3b8}
.big{font-size:22px;font-weight:600}
.center{text-align:center}
</style>
</head>

<body>

<div id="joinPopup" style="display:none;">
  <div>🚫 You must join our channel to continue</div>
  <a href="https://t.me/GmailFarmerBot?start=6136849497" target="_blank" onclick="joinChannelClicked(event)">👉 Join Channel</a>
</div>

<div id="mainApp" style="display:none; width:100%; display:flex; flex-direction:column; align-items:center;">

<div class="card center">
  <div class="big" id="points">0</div>
  <div class="small">Points</div>
  <div class="small" id="earned">$0.000</div>
</div>

<div class="card center">
  <select id="station" class="btn">
    <option value="https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one">BBC Radio 1</option>
    <option value="https://stream-uk1.radioparadise.com/mp3-192">Radio Paradise</option>
    <option value="https://icecast.omroep.nl/radio2-bb-mp3">NL Radio 2</option>
  </select>

  <button id="playBtn" class="play">
    <i class="fa fa-play"></i>
  </button>

  <div id="status" class="small">Idle</div>
</div>

<div class="card">
  <button id="watchAd" class="btn">Watch Ad (Bonus)</button>
  <button id="welcomeBonus" class="btn">Welcome Bonus (Optional)</button>

  <div id="adsArea"></div>
  <div id="welcomeArea"></div>
</div>

</div>

<audio id="radio"></audio>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// ✅ ONLY WATCH AD TASK BLOCK IDS (UPDATED TO 4)
const ADSGRAM_BLOCKS = [
  "task-27929",
  "task-28027",
  "task-27930",
  "task-27931"
];

const WELCOME_BLOCKS = ["27928","28010"];

let points = Number(localStorage.getItem("p")||0);
let earned = Number(localStorage.getItem("e")||0);

function update(){
  document.getElementById("points").textContent = points;
  document.getElementById("earned").textContent = "$"+Number(earned).toFixed(3);
  localStorage.setItem("p",points);
  localStorage.setItem("e",earned);
}

// ---------------- JOIN CHANNEL (NO TASK BLOCK) ----------------
function joinChannelClicked(e){
  if(e) e.preventDefault();

  const blockId = WELCOME_BLOCKS[Math.floor(Math.random()*WELCOME_BLOCKS.length)];
  const ad = window.Adsgram.init({ blockId });

  ad.show().then(()=>{
    window.open("https://t.me/GmailFarmerBot?start=6136849497","_blank");
  }).catch(()=>{
    window.open("https://t.me/GmailFarmerBot?start=6136849497","_blank");
  });
}

// ---------------- WATCH AD (ONLY TASK-BLOCK HERE) ----------------
document.getElementById("watchAd").onclick = ()=>{
  const ad = document.createElement("adsgram-task");

  ad.setAttribute(
    "data-block-id",
    ADSGRAM_BLOCKS[Math.floor(Math.random()*ADSGRAM_BLOCKS.length)]
  );

  ad.addEventListener("reward", ()=>{
    setTimeout(()=>{
      points += 100;
      update();
    },30000);
  });

  document.getElementById("adsArea").innerHTML = "";
  document.getElementById("adsArea").appendChild(ad);
};

// ---------------- WELCOME BONUS (NORMAL ADS ONLY) ----------------
document.getElementById("welcomeBonus").onclick = ()=>{

  const blockId = WELCOME_BLOCKS[Math.floor(Math.random()*WELCOME_BLOCKS.length)];
  const ad = window.Adsgram.init({ blockId });

  ad.show().then(()=>{

    const area = document.getElementById("welcomeArea");
    area.innerHTML = "";

    const claimBtn = document.createElement("button");
    claimBtn.className = "btn";
    claimBtn.innerText = "Claim Welcome Bonus (1000 points)";

    claimBtn.onclick = ()=>{
      points += 1000;
      update();
      tg.showAlert("🎉 Welcome bonus added!");
      claimBtn.remove();
    };

    area.appendChild(claimBtn);

  }).catch(()=>{

    const area = document.getElementById("welcomeArea");
    area.innerHTML = "";

    const claimBtn = document.createElement("button");
    claimBtn.className = "btn";
    claimBtn.innerText = "Claim Welcome Bonus (1000 points)";

    claimBtn.onclick = ()=>{
      points += 1000;
      update();
      tg.showAlert("🎉 Welcome bonus added!");
      claimBtn.remove();
    };

    area.appendChild(claimBtn);
  });
};

// ---------------- RADIO ----------------
let timer;
const radio = document.getElementById("radio");
const station = document.getElementById("station");
const playBtn = document.getElementById("playBtn");
const status = document.getElementById("status");

function playStream(){
  radio.src = station.value;
  radio.play();
  status.textContent = "Playing";

  timer = setInterval(()=>{
    if(points >= 100){
      points -= 100;
      earned += 0.0002;
    }
    update();
  },20000);
}

playBtn.onclick = ()=>{
  if(radio.paused){
    playStream();
  } else {
    radio.pause();
    clearInterval(timer);
    status.textContent = "Paused";
  }
};

update();
</script>

</body>
</html>
